name: 🍄 Deploy Mario Calculator
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🏗️ Build
        run: npm run build
      - name: 🔍 Verify dist
        run: |
          echo "=== dist root ===" && ls dist/
          echo "=== icons ===" && ls dist/icons/
          echo "=== .well-known ===" && ls dist/.well-known/
          echo "=== manifest ===" && cat dist/manifest.json | head -5
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🌐 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
  android:
    name: 📱 Build & Deploy Android
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: ✅ Verify Node version
        run: node --version && npm --version
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🏗️ Build PWA
        run: npm run build
      - name: 🔄 Sync Capacitor
        run: ./node_modules/.bin/cap sync android
      - name: 🔧 Patch build.gradle
        run: |
          printf 'apply plugin: "com.android.application"\nandroid {\n    compileSdk 35\n    namespace "com.mariocalculator.myapp"\n    defaultConfig {\n        applicationId "com.mariocalculator.myapp"\n        minSdk 22\n        targetSdk 35\n        versionCode 1\n        versionName "1.0.0"\n    }\n    signingConfigs {\n        release {\n            storeFile file("android.keystore")\n            storePassword "Saiful@1985"\n            keyAlias "android"\n            keyPassword "Saiful@1985"\n        }\n    }\n    buildTypes {\n        release {\n            minifyEnabled false\n            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"\n            signingConfig signingConfigs.release\n        }\n    }\n}\nrepositories {\n    flatDir {\n        dirs "../capacitor-cordova-android-plugins/src/main/libs", "libs"\n    }\n}\ndependencies {\n    implementation fileTree(include: ["*.jar"], dir: "libs")\n    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"\n    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"\n    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"\n    implementation project(":capacitor-android")\n    testImplementation "junit:junit:$junitVersion"\n    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"\n    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"\n    implementation project(":capacitor-cordova-android-plugins")\n}\napply from: "capacitor.build.gradle"\n' > android/app/build.gradle
          echo "=== build.gradle content ===" && cat android/app/build.gradle
      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/android.keystore
      - name: 🏗️ Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
      - name: 🚀 Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.mariocalculator.myapp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed