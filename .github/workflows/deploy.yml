name: 🍄 Deploy Mario Calculator
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🏗️ Build
        run: npm run build
      - name: 🔍 Verify dist
        run: |
          echo "=== dist root ===" && ls dist/
          echo "=== icons ===" && ls dist/icons/
          echo "=== .well-known ===" && ls dist/.well-known/
          echo "=== manifest ===" && cat dist/manifest.json | head -5
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🌐 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
  android:
    name: 📱 Build & Deploy Android
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: ✅ Verify Node version
        run: node --version && npm --version
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🏗️ Build PWA
        run: npm run build
      - name: 🔄 Sync Capacitor
        run: ./node_modules/.bin/cap sync android
      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/android.keystore
      - name: 🏗️ Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
      - name: 🚀 Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.mariocalculator.myapp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed